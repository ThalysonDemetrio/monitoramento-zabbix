version: '3.8'

services:
  # --- BANCO DE DADOS ---
  database:
    image: mysql:8.0
    container_name: trads-zabbix-db
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=zabbix
      - MYSQL_USER=zabbix
      - MYSQL_PASSWORD=zabbix_pwd
      - MYSQL_ROOT_PASSWORD=root_pwd
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    volumes:
      # Apontando para a nova estrutura organizada
      - ./data/mysql:/var/lib/mysql
    networks:
      - trads-monitoring-net

  # --- BACKEND (SERVIDOR) ---
  zabbix-server:
    image: zabbix/zabbix-server-mysql:ubuntu-7.0-latest
    container_name: trads-zabbix-server
    restart: unless-stopped
    ports:
      - "10051:10051"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    environment:
      - DB_SERVER_HOST=database
      - MYSQL_DATABASE=zabbix
      - MYSQL_USER=zabbix
      - MYSQL_PASSWORD=zabbix_pwd
      - MYSQL_ROOT_PASSWORD=root_pwd
    networks:
      - trads-monitoring-net
    depends_on:
      - database

  # --- FRONTEND (INTERFACE WEB) ---
  zabbix-web:
    image: zabbix/zabbix-web-nginx-mysql:ubuntu-7.0-latest
    container_name: trads-zabbix-web
    restart: unless-stopped
    ports:
      - "9090:8080"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    environment:
      - ZBX_SERVER_HOST=zabbix-server
      - DB_SERVER_HOST=database
      - MYSQL_DATABASE=zabbix
      - MYSQL_USER=zabbix
      - MYSQL_PASSWORD=zabbix_pwd
      - PHP_TZ=America/Sao_Paulo
    networks:
      - trads-monitoring-net
    depends_on:
      - zabbix-server

  # --- DASHBOARDS (GRAFANA) ---
  grafana:
    image: grafana/grafana:latest
    container_name: trads-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    volumes:
      # Apontando para a nova estrutura organizada
      - ./data/grafana:/var/lib/grafana
    environment:
      - GF_INSTALL_PLUGINS=alexanderzobnin-zabbix-app
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - trads-monitoring-net

# --- REDE ISOLADA ---
networks:
  trads-monitoring-net:
    driver: bridge
    name: trads-monitoring-net