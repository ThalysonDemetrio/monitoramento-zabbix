name: Docker Compose Validation & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-zabbix-stack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose-plugin

      - name: Validar sintaxe do Docker Compose
        run: docker compose config --quiet

      - name: Criar diretórios de volumes
        run: |
          mkdir -p data/mysql
          mkdir -p data/grafana

      - name: Testar build/pull das imagens
        run: docker compose pull --quiet

      - name: Testar inicialização (dry-run)
        run: docker compose up --no-start --quiet

      - name: Validar rede e dependências
        run: |
          echo "✅ Rede: trads-monitoring-net"
          echo "✅ Serviços configurados:"
          docker compose config --services