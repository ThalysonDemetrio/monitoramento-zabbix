name: Docker Compose Validation & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-zabbix-stack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Criar diretórios de volumes
        # CRITICAL: Isso deve vir antes de qualquer comando 'docker compose'
        # para evitar o erro de caminho não encontrado (Exit Code 100)
        run: |
          mkdir -p data/mysql
          mkdir -p data/grafana
          echo "✅ Diretórios de persistência criados."

      - name: Validar sintaxe do Docker Compose
        run: docker compose config --quiet

      - name: Testar pull das imagens
        # Isso garante que todas as imagens (Zabbix, MySQL, Grafana) existem e estão acessíveis
        run: docker compose pull --quiet

      - name: Testar inicialização (dry-run)
        run: docker compose up --no-start --quiet

      - name: Validar rede e dependências
        run: |
          echo "✅ Rede: trads-monitoring-net"
          echo "✅ Serviços configurados:"
          docker compose config --services